name: Test and Email

on:
  push:
    branches:
      - main

jobs:
  test-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build
        id: build
        run: npm run build
        continue-on-error: true

      - name: Run tests
        id: run_tests
        run: npm run test:e2e
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

      - name: Set result
        id: result
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" = "success" ] && [ "${{ steps.run_tests.outcome }}" = "success" ]; then
            echo "value=PASSED" >> $GITHUB_OUTPUT
          else
            echo "value=FAILED" >> $GITHUB_OUTPUT
          fi

      - name: Set email recipients
        id: recipients
        if: always()
        run: |
          if [ -n "${{ github.event.pusher.email }}" ]; then
            echo "to=${{ github.event.pusher.email }},srengty@gmail.com" >> $GITHUB_OUTPUT
          else
            echo "to=srengty@gmail.com" >> $GITHUB_OUTPUT
          fi

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[${{ steps.result.outputs.value }}] Tests — ${{ github.repository }} @ ${{ github.sha }}"
          body: |
            Test result: ${{ steps.result.outputs.value }}

            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit     : ${{ github.sha }}
            Pushed by  : ${{ github.actor }}
          to: ${{ steps.recipients.outputs.to }}
          from: ${{ secrets.MAIL_USERNAME }}

      - name: Fail if build or tests failed
        if: always()
        run: |
          if [ "${{ steps.result.outputs.value }}" = "FAILED" ]; then
            echo "Build or tests failed — marking workflow as failed."
            exit 1
          fi
